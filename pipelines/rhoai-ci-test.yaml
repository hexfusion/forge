# RHOAI CI Image Testing Pipeline
#
# Tests custom image combinations against the rhods-operator by patching
# RELATED_IMAGE_* env vars. Mix external CI images with locally-built ones.
#
# Usage:
#   forge pipeline create rhoai-ci-test --from pipelines/rhoai-ci-test.yaml
#   forge pipeline ship rhoai-ci-test --validate
#
# Note: The operator image itself must also be rhoai-3.4 for CRD/code alignment.
# Patch separately: CSV .spec.install.spec.deployments[0].spec.template.spec.containers[0].image
# = quay.io/rhoai/odh-rhel9-operator:rhoai-3.4

name: rhoai-ci-test

images:
  epp:
    source: external
    ref: quay.io/rhoai/odh-llm-d-inference-scheduler-rhel9:rhoai-3.4
    env_var: RELATED_IMAGE_ODH_LLM_D_INFERENCE_SCHEDULER_IMAGE

  routing-sidecar:
    source: external
    ref: quay.io/rhoai/odh-llm-d-routing-sidecar-rhel9:rhoai-3.4
    env_var: RELATED_IMAGE_ODH_LLM_D_ROUTING_SIDECAR_IMAGE

  kvcache:
    source: external
    ref: quay.io/rhoai/odh-llm-d-kv-cache-rhel9:rhoai-3.4
    env_var: RELATED_IMAGE_ODH_LLM_D_KV_CACHE_IMAGE

  kserve-storage-initializer:
    source: external
    ref: quay.io/rhoai/odh-kserve-storage-initializer-rhel9:rhoai-3.4
    env_var: RELATED_IMAGE_ODH_KSERVE_STORAGE_INITIALIZER_IMAGE

  kserve-controller:
    source: external
    ref: quay.io/rhoai/odh-kserve-controller-rhel9:rhoai-3.4
    env_var: RELATED_IMAGE_ODH_KSERVE_CONTROLLER_IMAGE

  kserve-agent:
    source: external
    ref: quay.io/rhoai/odh-kserve-agent-rhel9:rhoai-3.4
    env_var: RELATED_IMAGE_ODH_KSERVE_AGENT_IMAGE

  kserve-router:
    source: external
    ref: quay.io/rhoai/odh-kserve-router-rhel9:rhoai-3.4
    env_var: RELATED_IMAGE_ODH_KSERVE_ROUTER_IMAGE

deploy:
  kube_context: default/api-dagobah-hexfusion-local:6443/kube:admin
  namespace: redhat-ods-operator
  target_deployment: rhods-operator
  method: env-patch

validate:
  - name: e2e-smoke
    command: pytest -m "llminferenceservice and cluster_cpu" test/e2e/llmisvc/ -v
    working_dir: ~/projects/red-hat-data-services/kserve
    timeout: 600

  - name: odh-smoke
    command: pytest -m smoke tests/model_serving/model_server/llmd/test_llmd_smoke.py -v
    working_dir: ~/projects/opendatahub-io/opendatahub-tests
    timeout: 600
