name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Unit tests
        run: go test ./... -v -count=1

      - name: Build
        run: go build ./cmd/forge/

      - name: Verify CLI runs
        run: go run ./cmd/forge/ --help

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6

  integration:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.25.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install forge
        run: go install ./cmd/forge/

      - name: Start local registry
        run: |
          docker run -d --restart=always -p 5001:5000 --name forge-registry registry:2
          # Wait for registry
          for i in $(seq 1 10); do
            curl -s http://localhost:5001/v2/ && break
            sleep 1
          done

      - name: Create Kind cluster with registry
        run: |
          cat <<EOF | kind create cluster --name forge-test --config=-
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          containerdConfigPatches:
          - |-
            [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5001"]
              endpoint = ["http://forge-registry:5000"]
          EOF

          # Connect registry to kind network
          docker network connect kind forge-registry || true

          # Verify cluster
          kubectl cluster-info --context kind-forge-test
          kubectl get nodes

      - name: Run integration tests
        run: |
          go test ./test/integration/ -v -count=1 -timeout=5m \
            -tags=integration
        env:
          FORGE_STATE_DIR: /tmp/forge-test
          KUBE_CONTEXT: kind-forge-test
          FORGE_REGISTRY: localhost:5001

      - name: Cleanup
        if: always()
        run: |
          kind delete cluster --name forge-test
          docker rm -f forge-registry || true
